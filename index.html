<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#F6F4F1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Space">
<title>My Space</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F6F4F1;
  --bg2: #EDE9E2;
  --bg3: #E4DED2;
  --card: #ffffff;
  --border: #E4DED2;
  --border2: #d6cfc5;
  --text: #000000;
  --text2: #5a5550;
  --text3: #a8a29c;
  --accent: #F95C4B;
  --accent-soft: #f97060;
  --green: #5a7a5a;
  --red: #F95C4B;
  --blue: #4a6a8a;
  --yellow: #b8940a;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --font: 'DM Sans', 'Noto Sans JP', sans-serif;
  --font-d: 'DM Serif Display', serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  min-height: 100vh; min-height: 100dvh;
  overscroll-behavior: none;
}

/* ── NAV BAR ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(8px + var(--safe-b));
  z-index: 50;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: transparent; border: none; cursor: pointer;
  padding: 6px 0; transition: all 0.2s;
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; font-family: var(--font); }
.nav-btn.active .nav-label { color: var(--accent); font-weight: 600; }
.nav-btn.active .nav-icon { transform: translateY(-1px); }

/* ── PAGES ── */
.page { display: none; min-height: 100vh; padding-bottom: calc(72px + var(--safe-b)); }
.page.active { display: block; }

/* ── HEADER ── */
.page-header {
  padding: 52px 22px 16px;
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.page-date { font-size: 11px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
.page-title { font-family: var(--font-d); font-size: 32px; font-weight: 400; color: var(--text); line-height: 1.1; }
.page-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* ── SECTION ── */
.section { padding: 20px 22px 0; }
.section-title {
  font-size: 10px; font-weight: 600; color: var(--text3);
  letter-spacing: 0.18em; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── CARDS ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  margin-bottom: 10px;
}

/* ═══════════════════════════════════════════
   TASKS PAGE
═══════════════════════════════════════════ */
.task-input-row { display: flex; gap: 8px; margin-bottom: 6px; }
.task-text-inp {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--text); outline: none; transition: border-color 0.2s;
}
.task-text-inp:focus { border-color: var(--accent); }
.task-text-inp::placeholder { color: var(--text3); font-weight: 400; }
.add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 10px; width: 42px; height: 42px;
  font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s; flex-shrink: 0;
}
.add-btn:active { opacity: 0.7; }

.tag-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tag-chip {
  border: 1px solid var(--border2); border-radius: 6px;
  padding: 4px 10px; font-size: 11px; font-weight: 500;
  color: var(--text2); background: transparent; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.04em;
}
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
  transition: opacity 0.25s, transform 0.25s;
}
.task-item:last-child { border-bottom: none; }
.task-item.removing { opacity: 0; transform: translateX(16px); }

.task-cb {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border2); background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.task-cb.done { background: var(--accent); border-color: var(--accent); }
.task-cb svg { display: none; }
.task-cb.done svg { display: block; }

.task-body { flex: 1; min-width: 0; }
.task-txt { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; word-break: break-all; }
.task-txt.done { color: var(--text3); text-decoration: line-through; font-weight: 400; }
.task-tag { font-size: 11px; color: var(--text2); margin-top: 2px; letter-spacing: 0.06em; font-weight: 500; }
.task-deadline { font-size: 10px; color: var(--text3); }
.task-deadline.overdue { color: var(--red); }
.task-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 4px; }
.task-del:active { color: var(--red); }

.progress-summary {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--bg2);
  border-radius: 10px; margin-bottom: 16px;
}
.progress-nums { font-family: var(--font-d); font-size: 28px; color: var(--text); line-height: 1; }
.progress-nums span { font-size: 14px; font-family: var(--font); color: var(--text3); font-weight: 400; }
.progress-bar-v { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-v .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════════════════
   MEMO PAGE
═══════════════════════════════════════════ */
.memo-list { padding: 16px 22px; display: flex; flex-direction: column; gap: 10px; }
.memo-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; cursor: pointer;
  transition: border-color 0.15s;
  animation: fadeIn 0.25s ease;
}
.memo-card:active { border-color: var(--border2); background: var(--bg2); }
.memo-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.memo-card-preview { font-size: 12px; color: var(--text3); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.memo-card-date { font-size: 10px; color: var(--text3); margin-top: 8px; letter-spacing: 0.06em; }

.memo-fab {
  position: fixed; right: 22px; bottom: calc(80px + var(--safe-b));
  width: 52px; height: 52px; background: var(--accent); color: #fff;
  border: none; border-radius: 50%; font-size: 26px;
  cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  display: flex; align-items: center; justify-content: center;
  z-index: 20; transition: opacity 0.15s;
}
.memo-fab:active { opacity: 0.8; }

.memo-editor {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 100; display: none; flex-direction: column;
}
.memo-editor.open { display: flex; }
.memo-editor-header {
  display: flex; align-items: center; gap: 12px;
  padding: 52px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.memo-back-btn { background: transparent; border: none; font-size: 22px; color: var(--text2); cursor: pointer; padding: 4px; }
.memo-title-inp {
  flex: 1; background: transparent; border: none;
  font-family: var(--font-d); font-size: 22px; color: var(--text); outline: none;
}
.memo-title-inp::placeholder { color: var(--text3); }
.memo-del-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 4px 8px; }
.memo-body-inp {
  flex: 1; background: transparent; border: none;
  padding: 18px 22px; font-family: var(--font);
  font-size: 15px; font-weight: 400; color: var(--text);
  line-height: 1.8; outline: none; resize: none;
}
.memo-body-inp::placeholder { color: var(--text3); }
.memo-save-btn {
  margin: 0 22px 22px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; padding: 14px;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.08em;
}
.memo-save-btn:active { opacity: 0.8; }

/* ═══════════════════════════════════════════
   HABIT PAGE
═══════════════════════════════════════════ */
.habit-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; background: var(--card);
  border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
}
.habit-item.checked { background: var(--accent); border-color: var(--accent); }
.habit-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.habit-info { flex: 1; }
.habit-name { font-size: 14px; font-weight: 600; color: var(--text); }
.habit-item.checked .habit-name { color: #fff; }
.habit-streak { font-size: 11px; color: var(--text3); margin-top: 2px; }
.habit-item.checked .habit-streak { color: rgba(255,255,255,0.7); }
.habit-check { font-size: 18px; color: var(--text3); }
.habit-item.checked .habit-check { color: #fff; }

.habit-week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 8px; }
.habit-week-day { text-align: center; }
.habit-week-label { font-size: 9px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.habit-week-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg2); margin: 0 auto;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.habit-week-dot.done { background: var(--accent); color: #fff; }
.habit-week-dot.today { border: 1.5px solid var(--accent); }

.add-habit-btn {
  width: 100%; background: transparent; border: 1.5px dashed var(--border2);
  border-radius: 12px; padding: 14px; font-family: var(--font);
  font-size: 13px; font-weight: 500; color: var(--text3);
  cursor: pointer; margin-top: 4px; transition: all 0.15s;
}
.add-habit-btn:active { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════
   WEEKLY PLANNER PAGE
═══════════════════════════════════════════ */
.week-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 22px 12px;
}
.week-nav { background: transparent; border: none; font-size: 20px; color: var(--text2); cursor: pointer; padding: 4px 10px; }
.week-range { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }

.week-days { display: flex; gap: 0; overflow-x: auto; padding: 0 22px 12px; scrollbar-width: none; }
.week-days::-webkit-scrollbar { display: none; }
.week-day-tab {
  flex-shrink: 0; width: 48px; text-align: center;
  padding: 8px 0; border-radius: 10px; cursor: pointer;
  transition: all 0.15s; margin-right: 4px;
}
.week-day-tab.active { background: var(--accent); }
.week-day-tab .wd-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; }
.week-day-tab.active .wd-label { color: rgba(255,255,255,0.7); }
.week-day-tab .wd-num { font-size: 18px; font-weight: 600; color: var(--text); }
.week-day-tab.active .wd-num { color: #fff; }
.week-day-tab.today .wd-num { color: var(--accent); }
.week-day-tab.today.active .wd-num { color: #fff; }
.week-day-tab .wd-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin: 3px auto 0; }
.week-day-tab .wd-dot.has-tasks { background: var(--text3); }
.week-day-tab.active .wd-dot.has-tasks { background: rgba(255,255,255,0.6); }

.plan-list { padding: 0 22px; }
.plan-item {
  display: flex; gap: 14px; padding: 13px 0;
  border-bottom: 1px solid var(--border); animation: fadeIn 0.2s ease;
}
.plan-item:last-child { border-bottom: none; }
.plan-time { font-size: 11px; color: var(--text3); font-weight: 500; width: 40px; flex-shrink: 0; padding-top: 2px; letter-spacing: 0.04em; }
.plan-content { flex: 1; }
.plan-title-inp {
  width: 100%; background: transparent; border: none;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--text); outline: none; padding: 0;
}
.plan-title-inp::placeholder { color: var(--text3); font-weight: 400; }
.plan-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 0 4px; }
.plan-del:active { color: var(--red); }
.plan-add-row { display: flex; gap: 8px; padding: 14px 0; align-items: center; }
.plan-time-sel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px;
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--text); outline: none; width: 90px;
}
.plan-inp {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text); outline: none;
}
.plan-inp:focus { border-color: var(--accent); }
.plan-inp::placeholder { color: var(--text3); font-weight: 400; }
.plan-add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; width: 36px; height: 36px;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════
   WEIGHT SECTION
═══════════════════════════════════════════ */
.weight-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.weight-inp {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  font-family: var(--font); font-size: 16px; font-weight: 600;
  color: var(--text); outline: none; text-align: center;
}
.weight-inp:focus { border-color: var(--accent); }
.weight-unit { font-size: 13px; color: var(--text3); font-weight: 500; }
.weight-save-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 10px 18px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
}
.weight-log { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.weight-log-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.weight-log-item:last-child { border-bottom: none; }
.weight-log-date { color: var(--text3); }
.weight-log-val { font-weight: 600; color: var(--text); }
.weight-log-diff { font-size: 11px; }
.weight-log-diff.up { color: var(--red); }
.weight-log-diff.down { color: var(--green); }

/* ── Mini bar chart for weight ── */
.weight-chart { display: flex; align-items: flex-end; gap: 4px; height: 60px; margin-top: 8px; }
.weight-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.weight-bar { width: 100%; background: var(--border); border-radius: 3px; transition: height 0.4s ease; min-height: 2px; }
.weight-bar.latest { background: var(--accent); }
.weight-bar-label { font-size: 8px; color: var(--text3); }

/* ── OVERLAY SHEET ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 60; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.overlay.show { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 18px 22px calc(32px + var(--safe-b));
  z-index: 70; transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(.32,1,.4,1);
}
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-family: var(--font-d); font-size: 20px; color: var(--text); margin-bottom: 18px; }
.sheet-inp {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; font-family: var(--font);
  font-size: 14px; font-weight: 500; color: var(--text); outline: none;
  margin-bottom: 12px; transition: border-color 0.2s;
}
.sheet-inp:focus { border-color: var(--accent); }
.icon-pick-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.icon-pick {
  width: 40px; height: 40px; border-radius: 10px; background: var(--bg2);
  border: 1.5px solid transparent; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.icon-pick.active { border-color: var(--accent); background: var(--bg3); }
.sheet-submit {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 14px; font-family: var(--font);
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.sheet-submit:active { opacity: 0.8; }

/* ── Medication ── */
.med-group { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
.med-group-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.med-group-time { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.1em; }
.med-pills { display: flex; flex-direction: column; gap: 6px; }
.med-pill-row { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.med-pill-cb {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid var(--border2); background: transparent;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.2s;
}
.med-pill-cb.done { background: var(--accent); border-color: var(--accent); color: #fff; }
.med-pill-name { font-size: 13px; font-weight: 500; color: var(--text); }
.med-pill-name.done { text-decoration: line-through; color: var(--text3); }
.med-pill-dose { font-size: 11px; color: var(--text3); margin-left: auto; }

/* Med Sheet */
.med-list-edit { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.med-edit-row {
  display: flex; gap: 8px; align-items: center;
  background: var(--bg); border-radius: 10px; padding: 8px 12px;
}
.med-edit-name { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); }
.med-edit-time { font-size: 11px; color: var(--text3); }
.med-edit-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 14px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-b) + 12px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  z-index: 200; opacity: 0; transition: all 0.3s; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Med History ── */
.med-hist-item {
  font-size: 11px; color: var(--text3); padding: 4px 0;
  border-bottom: 1px solid var(--border);
}
.med-hist-item:last-child { border-bottom: none; }

@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* ═══════════════════════════════════════════
   VITALITY LOG
═══════════════════════════════════════════ */
.vitality-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.vitality-stars { display: flex; gap: 6px; justify-content: center; margin-bottom: 14px; }
.vitality-star {
  font-size: 28px; cursor: pointer; transition: transform 0.15s;
  filter: grayscale(1) opacity(0.35);
}
.vitality-star.active { filter: none; transform: scale(1.15); }
.vitality-save-btn {
  width: 100%; background: var(--accent); color: #fff; border: none;
  border-radius: 10px; padding: 11px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; margin-bottom: 4px;
}
.vitality-save-btn:active { opacity: 0.8; }

/* Vitality chart */
.vitality-chart-wrap { position: relative; margin-top: 12px; overflow: hidden; }
.vitality-canvas { width: 100%; height: 120px; display: block; }
.vitality-log-list { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
.vitality-log-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.vitality-log-item:last-child { border-bottom: none; }
.vitality-log-date { color: var(--text3); }
.vitality-log-val { font-weight: 600; display: flex; align-items: center; gap: 4px; }
.placenta-badge {
  font-size: 9px; background: #e8f4f8; color: var(--blue);
  border-radius: 4px; padding: 1px 5px; font-weight: 600; letter-spacing: 0.04em;
}
</style>
</head>
<body>

<!-- ══ TASK PAGE ══ -->
<div class="page active" id="page-task">
  <div class="page-header">
    <div class="page-date" id="task-date"></div>
    <div class="page-title">Tasks</div>
  </div>
  <div class="section" style="padding-top:16px;">
    <div class="progress-summary">
      <div>
        <div class="progress-nums"><span id="task-done">0</span> / <span id="task-total">0</span> <span>完了</span></div>
      </div>

    </div>
    <div class="task-input-row">
      <input class="task-text-inp" id="task-inp" placeholder="新しいタスクを追加…">

    <div class="tag-row" id="task-tag-row">
      <button class="tag-chip active" data-tag="all">すべて</button>
      <button class="tag-chip" data-tag="仕事">仕事</button>
      <button class="tag-chip" data-tag="個人">個人</button>
      <button class="tag-chip" data-tag="買い物">買い物</button>
      <button class="tag-chip" data-tag="勉強">勉強</button>
      <button class="tag-chip" data-tag="家族">家族</button>
    </div>
  </div>
  <div class="section">
    <div class="section-title">タスク一覧</div>
    <div class="card" style="padding: 0 16px;" id="task-list"></div>
  </div>
</div>

<!-- ══ MEMO PAGE ══ -->
<div class="page" id="page-memo">
  <div class="page-header">
    <div class="page-date" id="memo-date"></div>
    <div class="page-title">Memo</div>

</div>

<!-- Memo Editor -->

  <div class="memo-editor-header">

  <textarea class="memo-body-inp" id="memo-body-inp" placeholder="ここに書く…"></textarea>
  <button class="memo-save-btn" id="memo-save-btn">保存する</button>
</div>

<!-- ══ HABIT PAGE ══ -->
<div class="page" id="page-habit">
  <div class="page-header">
    <div class="page-date" id="habit-date"></div>
    <div class="page-title">Habits</div>
  </div>

  <!-- 💊 MEDICATION -->
  <div class="section" style="padding-top:16px; padding-bottom:4px;">
    <div class="section-title">💊 お薬チェック</div>
    <div id="med-groups"></div>
    <button class="add-habit-btn" id="add-med-btn" style="margin-top:4px;">＋ お薬を追加・編集</button>
    <div style="margin-top:10px;">
      <textarea id="med-memo" placeholder="気になる症状・体調メモ（任意）…"
        style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;
               padding:11px 14px;font-family:var(--font);font-size:13px;color:var(--text);
               outline:none;resize:none;line-height:1.6;" rows="2"></textarea>

  <!-- 習慣 -->

    <div id="habit-list"></div>

    <div class="section-title">今週の記録</div>
    <div class="card" id="habit-week-card"></div>
  </div>

  <!-- 💫 VITALITY LOG -->
  <div class="section" style="padding-top:20px;">
    <div class="section-title">💫 気力ログ</div>
    <div class="card">
      <div style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:10px;letter-spacing:0.04em;">今日の気力レベルを記録</div>
      <div class="vitality-stars" id="vitality-stars">
        <span class="vitality-star" data-v="1">😴</span>
        <span class="vitality-star" data-v="2">😔</span>
        <span class="vitality-star" data-v="3">😐</span>
        <span class="vitality-star" data-v="4">😊</span>
        <span class="vitality-star" data-v="5">🔥</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;">

          💉 プラセンタ注射をした
        </label>
      </div>
      <button class="vitality-save-btn" id="vitality-save-btn">記録する</button>
    </div>
    <div class="card" style="padding:16px;" id="vitality-chart-card">
      <div style="font-size:10px;color:var(--text3);letter-spacing:0.12em;font-weight:600;margin-bottom:8px;">30日グラフ　💉＝プラセンタの日</div>
      <canvas class="vitality-canvas" id="vitality-canvas"></canvas>
    </div>
    <div class="card" style="padding:0 16px;" id="vitality-log-list"></div>
  </div>

  <!-- ⚖ WEIGHT -->
  <div class="section" style="padding-top:20px; padding-bottom:16px;">
    <div class="section-title">⚖ 体重記録</div>
    <div class="card">
      <div class="weight-input-row">
        <input class="weight-inp" id="weight-inp" type="number" step="0.1" min="20" max="300" placeholder="00.0">
        <span class="weight-unit">kg</span>
        <button class="weight-save-btn" id="weight-save-btn">記録する</button>
      </div>
      <div class="weight-chart" id="weight-chart"></div>
    </div>
    <div class="card" style="padding: 0 16px;" id="weight-log"></div>
  </div>
</div>

<!-- ══ WEEKLY PLANNER PAGE ══ -->

</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="nav">
  <button class="nav-btn active" data-page="task">
    <span class="nav-icon">☑</span>
    <span class="nav-label">TASKS</span>
  </button>

<!-- OVERLAYS -->
<div class="overlay" id="overlay"></div>

<!-- Habit Add Sheet -->
<div class="sheet" id="habit-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">習慣を追加</div>
  <input class="sheet-inp" id="habit-name-inp" placeholder="習慣名（例：ストレッチ）">
  <div style="font-size:10px;color:var(--text3);letter-spacing:0.12em;margin-bottom:10px;">アイコンを選ぶ</div>
  <div class="icon-pick-row" id="icon-pick-row">
    <button class="icon-pick active" data-icon="🏃">🏃</button>
    <button class="icon-pick" data-icon="💪">💪</button>
    <button class="icon-pick" data-icon="📚">📚</button>
    <button class="icon-pick" data-icon="🧘">🧘</button>
    <button class="icon-pick" data-icon="💧">💧</button>
    <button class="icon-pick" data-icon="😴">😴</button>
    <button class="icon-pick" data-icon="🍎">🍎</button>
    <button class="icon-pick" data-icon="✍️">✍️</button>

</div>

<!-- Med Add Sheet -->
<div class="sheet" id="med-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">お薬を管理</div>
  <div class="med-list-edit" id="med-list-edit"></div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <input class="sheet-inp" id="med-name-inp" placeholder="薬の名前" style="margin-bottom:0;flex:1;">

  </div>

    <option value="朝">朝</option>

  </select>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════
// STORAGE HELPERS
// ══════════════════════════════════════════
const store = {
  get: (k, def = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

// ══════════════════════════════════════════
// DATE HELPERS
// ══════════════════════════════════════════
const DAY_JA = ['日','月','火','水','木','金','土'];
const DAY_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MONTH_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function today() { return new Date(); }
function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayKey() { return dateKey(today()); }
function formatDate(d) { return `${MONTH_EN[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} — ${DAY_JA[d.getDay()]}曜日`; }

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════
// NAV
// ══════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const page = btn.dataset.page;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`page-${page}`).classList.add('active');
    if (page === 'week') renderWeek();
    if (page === 'habit') { renderHabits(); renderMeds(); renderWeekCard(); renderWeight(); renderVitality(); }
    if (page === 'memo') renderMemos();
    if (page === 'task') renderTasks();
  });
});

// ══════════════════════════════════════════
// SET DATES
// ══════════════════════════════════════════
const d = today();
const dateStr = formatDate(d);
['task-date','memo-date','habit-date','week-date'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.textContent = dateStr;
});

// ══════════════════════════════════════════
// TASKS
// ══════════════════════════════════════════
let tasks = store.get('tasks', []);
let taskFilter = 'all';

function saveTasks() { store.set('tasks', tasks); }

function renderTasks() {
  const list = document.getElementById('task-list');
  const filtered = taskFilter === 'all' ? tasks : tasks.filter(t => t.tag === taskFilter);
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  document.getElementById('task-done').textContent = done;
  document.getElementById('task-total').textContent = total;
  document.getElementById('task-prog').style.width = total ? `${(done/total)*100}%` : '0%';

  if (!filtered.length) {
    list.innerHTML = '<div style="text-align:center;padding:32px 0;color:var(--text3);font-size:13px;">タスクがありません</div>';
    return;
  }
  list.innerHTML = filtered.map(t => `
    <div class="task-item${t.removing?' removing':''}" data-id="${t.id}">
      <div class="task-cb${t.done?' done':''}" onclick="toggleTask('${t.id}')">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-txt${t.done?' done':''}">${t.text}</div>
        ${t.tag ? `<div class="task-tag">#${t.tag}</div>` : ''}
      </div>
      <button class="task-del" onclick="deleteTask('${t.id}')">×</button>
    </div>
  `).join('');
}

function addTask() {
  const inp = document.getElementById('task-inp');
  const text = inp.value.trim();
  if (!text) return;
  const activeTag = taskFilter !== 'all' ? taskFilter : '';
  tasks.unshift({ id: Date.now().toString(), text, tag: activeTag, done: false, createdAt: todayKey() });
  saveTasks(); inp.value = ''; renderTasks();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); renderTasks(); }
}

function deleteTask(id) {
  const el = document.querySelector(`.task-item[data-id="${id}"]`);
  if (el) {
    el.classList.add('removing');
    setTimeout(() => { tasks = tasks.filter(t => t.id !== id); saveTasks(); renderTasks(); }, 260);
  }
}

document.getElementById('task-add-btn').addEventListener('click', addTask);
document.getElementById('task-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

document.getElementById('task-tag-row').addEventListener('click', e => {
  const chip = e.target.closest('.tag-chip');
  if (!chip) return;
  taskFilter = chip.dataset.tag;
  document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  renderTasks();
});

renderTasks();

// ══════════════════════════════════════════
// MEMOS
// ══════════════════════════════════════════
let memos = store.get('memos', []);
let editingMemoId = null;

function saveMemos() { store.set('memos', memos); }

function renderMemos() {
  const list = document.getElementById('memo-list');
  const count = document.getElementById('memo-count');
  count.textContent = `${memos.length}件のメモ`;
  if (!memos.length) {
    list.innerHTML = '<div style="text-align:center;padding:48px 0;color:var(--text3);font-size:13px;">＋ボタンでメモを追加</div>';
    return;
  }
  list.innerHTML = memos.map(m => `
    <div class="memo-card" onclick="openMemo('${m.id}')">
      <div class="memo-card-title">${m.title || '無題'}</div>
      <div class="memo-card-preview">${m.body || ''}</div>
      <div class="memo-card-date">${m.updatedAt || ''}</div>
    </div>
  `).join('');
}

function openMemoEditor(id = null) {
  editingMemoId = id;
  const m = id ? memos.find(m => m.id === id) : null;
  document.getElementById('memo-title-inp').value = m?.title || '';
  document.getElementById('memo-body-inp').value = m?.body || '';
  document.getElementById('memo-editor').classList.add('open');
}

function openMemo(id) { openMemoEditor(id); }

function saveMemo() {
  const title = document.getElementById('memo-title-inp').value.trim();
  const body = document.getElementById('memo-body-inp').value.trim();
  if (!title && !body) { showToast('内容を入力してください'); return; }
  const now = formatDate(today());
  if (editingMemoId) {
    const m = memos.find(m => m.id === editingMemoId);
    if (m) { m.title = title; m.body = body; m.updatedAt = now; }
  } else {
    memos.unshift({ id: Date.now().toString(), title, body, updatedAt: now });
  }
  saveMemos(); closeMemoEditor(); renderMemos(); showToast('保存しました');
}

function deleteMemo() {
  if (!editingMemoId) { closeMemoEditor(); return; }
  memos = memos.filter(m => m.id !== editingMemoId);
  saveMemos(); closeMemoEditor(); renderMemos(); showToast('削除しました');
}

function closeMemoEditor() {
  document.getElementById('memo-editor').classList.remove('open');
  editingMemoId = null;
}

document.getElementById('memo-fab').addEventListener('click', () => openMemoEditor());
document.getElementById('memo-back').addEventListener('click', closeMemoEditor);
document.getElementById('memo-save-btn').addEventListener('click', saveMemo);
document.getElementById('memo-del-btn').addEventListener('click', deleteMemo);

renderMemos();

// ══════════════════════════════════════════
// HABITS
// ══════════════════════════════════════════
let habits = store.get('habits', [
  { id: '1', name: '水を飲む', icon: '💧', streak: 0, log: [] },
  { id: '2', name: '読書', icon: '📚', streak: 0, log: [] },
]);
let habitChecks = store.get('habit-checks', {}); // { 'YYYY-MM-DD': [id, ...] }

function saveHabits() { store.set('habits', habits); }
function saveHabitChecks() { store.set('habit-checks', habitChecks); }

function isHabitDoneToday(id) {
  return (habitChecks[todayKey()] || []).includes(id);
}

function toggleHabit(id) {
  const key = todayKey();
  if (!habitChecks[key]) habitChecks[key] = [];
  const idx = habitChecks[key].indexOf(id);
  if (idx >= 0) habitChecks[key].splice(idx, 1);
  else habitChecks[key].push(id);
  saveHabitChecks();
  updateStreaks();
  renderHabits();
  renderWeekCard();
}

function updateStreaks() {
  habits.forEach(h => {
    let streak = 0;
    const d = new Date(today());
    while (true) {
      const k = dateKey(d);
      if ((habitChecks[k] || []).includes(h.id)) { streak++; d.setDate(d.getDate()-1); }
      else break;
    }
    h.streak = streak;
  });
  saveHabits();
}

function renderHabits() {
  const list = document.getElementById('habit-list');
  if (!habits.length) { list.innerHTML = '<div style="color:var(--text3);font-size:13px;padding:8px 0;">習慣がありません</div>'; return; }
  list.innerHTML = habits.map(h => {
    const done = isHabitDoneToday(h.id);
    return `
      <div class="habit-item${done?' checked':''}" onclick="toggleHabit('${h.id}')">
        <div class="habit-icon">${h.icon}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">${h.streak > 0 ? `🔥 ${h.streak}日連続` : '今日始めよう'}</div>
        </div>
        <div class="habit-check">${done ? '✓' : '○'}</div>
      </div>
    `;
  }).join('');
}

function renderWeekCard() {
  const card = document.getElementById('habit-week-card');
  if (!habits.length) { card.innerHTML = '<div style="color:var(--text3);font-size:13px;">習慣を追加してください</div>'; return; }
  const now = today();
  const dayOfWeek = now.getDay(); // 0=Sun
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - dayOfWeek + i);
    weekDays.push(d);
  }
  card.innerHTML = habits.map(h => `
    <div style="margin-bottom:14px;">
      <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px;">${h.icon} ${h.name}</div>
      <div class="habit-week-grid">
        ${weekDays.map(d => {
          const k = dateKey(d);
          const isToday = k === todayKey();
          const done = (habitChecks[k] || []).includes(h.id);
          return `
            <div class="habit-week-day">
              <div class="habit-week-label">${DAY_JA[d.getDay()]}</div>
              <div class="habit-week-dot${done?' done':''}${isToday?' today':''}">${done ? '✓' : ''}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('');
}

// Habit sheet
let selectedIcon = '🏃';
document.querySelectorAll('.icon-pick').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.icon-pick').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedIcon = btn.dataset.icon;
  });
});

document.getElementById('add-habit-btn').addEventListener('click', () => showSheet('habit-sheet'));
document.getElementById('habit-submit').addEventListener('click', () => {
  const name = document.getElementById('habit-name-inp').value.trim();
  if (!name) return;
  habits.push({ id: Date.now().toString(), name, icon: selectedIcon, streak: 0, log: [] });
  saveHabits(); renderHabits(); renderWeekCard();
  document.getElementById('habit-name-inp').value = '';
  hideSheet('habit-sheet');
  showToast('習慣を追加しました');
});

renderHabits();
renderWeekCard();

// ══════════════════════════════════════════
// MEDICATIONS
// ══════════════════════════════════════════
let meds = store.get('meds', [
  { id: 'm1', name: 'ビタミンC', dose: '1錠', time: '朝' },
  { id: 'm2', name: '整腸剤', dose: '2錠', time: '朝' },
]);
let medChecks = store.get('med-checks', {}); // { 'YYYY-MM-DD': { 'medId': true } }
let medHistory = store.get('med-history', []); // [ { date, memo, checks } ]

function saveMeds() { store.set('meds', meds); }
function saveMedChecks() { store.set('med-checks', medChecks); }
function saveMedHistory() { store.set('med-history', medHistory); }

function isMedDoneToday(id) {
  return !!(medChecks[todayKey()] || {})[id];
}

function toggleMed(id) {
  const key = todayKey();
  if (!medChecks[key]) medChecks[key] = {};
  medChecks[key][id] = !medChecks[key][id];
  saveMedChecks();
  renderMeds();
}

function renderMeds() {
  const container = document.getElementById('med-groups');
  const timeGroups = ['朝', '昼', '夕', '就寝前'];
  const grouped = {};
  timeGroups.forEach(t => { grouped[t] = meds.filter(m => m.time === t); });

  container.innerHTML = timeGroups.filter(t => grouped[t].length > 0).map(t => `
    <div class="med-group">
      <div class="med-group-header">
        <div class="med-group-time">${t === '朝' ? '🌅' : t === '昼' ? '☀️' : t === '夕' ? '🌇' : '🌙'} ${t}</div>
        <div style="font-size:11px;color:var(--text3);">
          ${grouped[t].filter(m => isMedDoneToday(m.id)).length} / ${grouped[t].length}
        </div>
      </div>
      <div class="med-pills">
        ${grouped[t].map(m => {
          const done = isMedDoneToday(m.id);
          return `
            <div class="med-pill-row" onclick="toggleMed('${m.id}')">
              <div class="med-pill-cb${done?' done':''}">${done ? '✓' : ''}</div>
              <div class="med-pill-name${done?' done':''}">${m.name}</div>
              <div class="med-pill-dose">${m.dose || ''}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:13px;padding:8px 0;">お薬が登録されていません</div>';

  // Restore memo
  const memo = store.get('med-memo-' + todayKey(), '');
  document.getElementById('med-memo').value = memo;

  renderMedHistory();
}

document.getElementById('med-memo').addEventListener('input', function() {
  store.set('med-memo-' + todayKey(), this.value);
});

function renderMedHistory() {
  const hist = store.get('med-history', []);
  const el = document.getElementById('med-history');
  if (!hist.length) { el.innerHTML = ''; return; }
  const recent = hist.slice(0, 5);
  el.innerHTML = `
    <div style="font-size:10px;color:var(--text3);letter-spacing:0.12em;font-weight:600;margin-bottom:6px;">服薬履歴</div>
    ${recent.map(h => `
      <div class="med-hist-item">
        <span style="font-weight:600;">${h.date}</span>
        ${h.memo ? ` — ${h.memo.substring(0, 30)}` : ''}
        <span style="float:right;">${h.count}/${h.total}服用</span>
      </div>
    `).join('')}
  `;
}

// Med Sheet
document.getElementById('add-med-btn').addEventListener('click', () => {
  renderMedListEdit();
  showSheet('med-sheet');
});

function renderMedListEdit() {
  document.getElementById('med-list-edit').innerHTML = meds.map(m => `
    <div class="med-edit-row">
      <span class="med-edit-name">${m.name}</span>
      <span class="med-edit-time">${m.time} ${m.dose || ''}</span>
      <button class="med-edit-del" onclick="deleteMed('${m.id}')">×</button>
    </div>
  `).join('') || '<div style="color:var(--text3);font-size:12px;">登録なし</div>';
}

function deleteMed(id) {
  meds = meds.filter(m => m.id !== id);
  saveMeds();
  renderMedListEdit();
  renderMeds();
}

document.getElementById('med-submit').addEventListener('click', () => {
  const name = document.getElementById('med-name-inp').value.trim();
  const dose = document.getElementById('med-dose-inp').value.trim();
  const time = document.getElementById('med-time-inp').value;
  if (!name) return;
  meds.push({ id: Date.now().toString(), name, dose, time });
  saveMeds(); renderMedListEdit(); renderMeds();
  document.getElementById('med-name-inp').value = '';
  document.getElementById('med-dose-inp').value = '';
  showToast(`${name}を追加しました`);
});

renderMeds();

// ══════════════════════════════════════════
// WEIGHT
// ══════════════════════════════════════════
let weightLog = store.get('weight-log', []); // [ { date, val } ]

function saveWeight() { store.set('weight-log', weightLog); }

function addWeight() {
  const inp = document.getElementById('weight-inp');
  const val = parseFloat(inp.value);
  if (isNaN(val) || val < 20 || val > 300) { showToast('正しい体重を入力してください'); return; }
  const key = todayKey();
  const existing = weightLog.findIndex(w => w.date === key);
  if (existing >= 0) weightLog[existing].val = val;
  else weightLog.unshift({ date: key, val });
  weightLog = weightLog.slice(0, 30);
  saveWeight(); inp.value = ''; renderWeight(); showToast(`${val}kg を記録しました`);
}

function renderWeight() {
  const log = document.getElementById('weight-log');
  const chart = document.getElementById('weight-chart');
  if (!weightLog.length) {
    log.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px;">体重を記録してください</div>';
    chart.innerHTML = '';
    return;
  }
  // Chart (last 7)
  const recent = [...weightLog].reverse().slice(-7);
  const vals = recent.map(w => w.val);
  const maxV = Math.max(...vals);
  const minV = Math.min(...vals);
  const range = maxV - minV || 1;
  chart.innerHTML = recent.map((w, i) => {
    const pct = ((w.val - minV) / range * 80 + 20);
    const isLatest = i === recent.length - 1;
    const label = w.date.slice(5); // MM-DD
    return `
      <div class="weight-bar-wrap">
        <div class="weight-bar${isLatest?' latest':''}" style="height:${pct}%;"></div>
        <div class="weight-bar-label">${label.replace('-','/')}</div>
      </div>
    `;
  }).join('');
  // Log list
  log.innerHTML = weightLog.slice(0, 10).map((w, i) => {
    const prev = weightLog[i+1];
    let diffEl = '';
    if (prev) {
      const diff = (w.val - prev.val).toFixed(1);
      const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : '';
      const arrow = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
      diffEl = `<span class="weight-log-diff ${cls}">${arrow}${Math.abs(diff)}</span>`;
    }
    return `
      <div class="weight-log-item">
        <span class="weight-log-date">${w.date}</span>
        <span class="weight-log-val">${w.val} kg ${diffEl}</span>
      </div>
    `;
  }).join('');
}

document.getElementById('weight-save-btn').addEventListener('click', addWeight);
document.getElementById('weight-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addWeight(); });

renderWeight();

// ══════════════════════════════════════════
// VITALITY LOG
// ══════════════════════════════════════════
let vitalityLog = store.get('vitality-log', []); // [ { date, val, placenta } ]
let selectedVitality = 0;

function saveVitality() { store.set('vitality-log', vitalityLog); }

// Star selection
document.querySelectorAll('.vitality-star').forEach(star => {
  star.addEventListener('click', () => {
    selectedVitality = parseInt(star.dataset.v);
    document.querySelectorAll('.vitality-star').forEach(s => {
      s.classList.toggle('active', parseInt(s.dataset.v) <= selectedVitality);
    });
  });
});

document.getElementById('vitality-save-btn').addEventListener('click', () => {
  if (!selectedVitality) { showToast('気力レベルを選んでください'); return; }
  const key = todayKey();
  const placenta = document.getElementById('placenta-check').checked;
  const existing = vitalityLog.findIndex(v => v.date === key);
  if (existing >= 0) {
    vitalityLog[existing].val = selectedVitality;
    vitalityLog[existing].placenta = placenta;
  } else {
    vitalityLog.unshift({ date: key, val: selectedVitality, placenta });
  }
  vitalityLog = vitalityLog.slice(0, 30);
  saveVitality();
  document.getElementById('placenta-check').checked = false;
  selectedVitality = 0;
  document.querySelectorAll('.vitality-star').forEach(s => s.classList.remove('active'));
  renderVitality();
  showToast('気力を記録しました');
});

function renderVitality() {
  const listEl = document.getElementById('vitality-log-list');
  const canvas = document.getElementById('vitality-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  if (!vitalityLog.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:20px 0;color:var(--text3);font-size:13px;">気力を記録してください</div>';
    return;
  }

  // ── Canvas chart ──
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement ? canvas.parentElement.clientWidth - 32 : 300;
  const H = 120;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  const data = [...vitalityLog].reverse().slice(-30);
  const n = data.length;
  const padL = 24, padR = 8, padT = 10, padB = 20;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  // Grid lines
  ctx.strokeStyle = '#E4DED2';
  ctx.lineWidth = 0.5;
  for (let v = 1; v <= 5; v++) {
    const y = padT + chartH - ((v - 1) / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    ctx.fillStyle = '#a8a29c';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(v, padL - 4, y + 3);
  }

  // Placenta markers (vertical lines)
  data.forEach((d, i) => {
    if (!d.placenta) return;
    const x = padL + (n === 1 ? chartW / 2 : (i / (n - 1)) * chartW);
    ctx.strokeStyle = 'rgba(74,106,138,0.25)';
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, padT + chartH); ctx.stroke();
  });

  // Line
  ctx.strokeStyle = '#F95C4B';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = padL + (n === 1 ? chartW / 2 : (i / (n - 1)) * chartW);
    const y = padT + chartH - ((d.val - 1) / 4) * chartH;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  data.forEach((d, i) => {
    const x = padL + (n === 1 ? chartW / 2 : (i / (n - 1)) * chartW);
    const y = padT + chartH - ((d.val - 1) / 4) * chartH;
    ctx.fillStyle = d.placenta ? '#4a6a8a' : '#F95C4B';
    ctx.beginPath(); ctx.arc(x, y, 3.5, 0, Math.PI * 2); ctx.fill();
  });

  // X axis dates (first, middle, last)
  ctx.fillStyle = '#a8a29c';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'center';
  const showIdxs = n <= 3 ? data.map((_,i)=>i) : [0, Math.floor((n-1)/2), n-1];
  showIdxs.forEach(i => {
    const x = padL + (n === 1 ? chartW / 2 : (i / (n - 1)) * chartW);
    ctx.fillText(data[i].date.slice(5).replace('-','/'), x, H - 4);
  });

  // ── Log list (latest 7) ──
  const EMOJI = ['','😴','😔','😐','😊','🔥'];
  listEl.innerHTML = vitalityLog.slice(0, 7).map(v => `
    <div class="vitality-log-item">
      <span class="vitality-log-date">${v.date}</span>
      <span class="vitality-log-val">
        ${EMOJI[v.val]} ${v.val}/5
        ${v.placenta ? '<span class="placenta-badge">💉 注射</span>' : ''}
      </span>
    </div>
  `).join('');
}

renderVitality();

// ══════════════════════════════════════════
// WEEKLY PLANNER
// ══════════════════════════════════════════
let plans = store.get('plans', {}); // { 'YYYY-MM-DD': [ { id, time, title } ] }
let weekOffset = 0;
let selectedWeekDay = todayKey();

function savePlans() { store.set('plans', plans); }

function getWeekStart(offset = 0) {
  const d = new Date(today());
  d.setDate(d.getDate() - d.getDay() + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function renderWeek() {
  const start = getWeekStart(weekOffset);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);

  const fmtShort = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('week-range').textContent = `${fmtShort(start)} – ${fmtShort(end)}`;

  const daysEl = document.getElementById('week-days');
  const todK = todayKey();
  daysEl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const k = dateKey(d);
    const isToday = k === todK;
    const isActive = k === selectedWeekDay;
    const hasTasks = (plans[k] || []).length > 0;
    const tab = document.createElement('div');
    tab.className = `week-day-tab${isActive?' active':''}${isToday?' today':''}`;
    tab.innerHTML = `
      <div class="wd-label">${DAY_EN[d.getDay()]}</div>
      <div class="wd-num">${d.getDate()}</div>
      <div class="wd-dot${hasTasks?' has-tasks':''}"></div>
    `;
    tab.addEventListener('click', () => {
      selectedWeekDay = k;
      renderWeek();
    });
    daysEl.appendChild(tab);
  }

  renderPlanList();

  // Populate time select
  const sel = document.getElementById('plan-time-sel');
  sel.innerHTML = '<option value="">時間なし</option>';
  for (let h = 6; h <= 23; h++) {
    ['00','30'].forEach(m => {
      const v = `${String(h).padStart(2,'0')}:${m}`;
      sel.innerHTML += `<option value="${v}">${v}</option>`;
    });
  }
}

function renderPlanList() {
  const list = document.getElementById('plan-list');
  const dayPlans = (plans[selectedWeekDay] || []).sort((a,b) => {
    if (!a.time && !b.time) return 0;
    if (!a.time) return 1;
    if (!b.time) return -1;
    return a.time.localeCompare(b.time);
  });

  if (!dayPlans.length) {
    list.innerHTML = '<div style="padding:32px 22px;text-align:center;color:var(--text3);font-size:13px;">この日の予定はありません</div>';
    return;
  }
  list.innerHTML = `<div class="card" style="padding:0 16px;">${dayPlans.map(p => `
    <div class="plan-item">
      <div class="plan-time">${p.time || '——'}</div>
      <div class="plan-content">
        <input class="plan-title-inp" value="${p.title}" onchange="updatePlan('${p.id}', this.value)" placeholder="予定…">
      </div>
      <button class="plan-del" onclick="deletePlan('${p.id}')">×</button>
    </div>
  `).join('')}</div>`;
}

function addPlan() {
  const title = document.getElementById('plan-inp').value.trim();
  if (!title) return;
  const time = document.getElementById('plan-time-sel').value;
  if (!plans[selectedWeekDay]) plans[selectedWeekDay] = [];
  plans[selectedWeekDay].push({ id: Date.now().toString(), time, title });
  savePlans();
  document.getElementById('plan-inp').value = '';
  renderWeek();
}

function updatePlan(id, title) {
  const p = (plans[selectedWeekDay] || []).find(p => p.id === id);
  if (p) { p.title = title; savePlans(); }
}

function deletePlan(id) {
  if (plans[selectedWeekDay]) {
    plans[selectedWeekDay] = plans[selectedWeekDay].filter(p => p.id !== id);
    savePlans(); renderWeek();
  }
}

document.getElementById('plan-add-btn').addEventListener('click', addPlan);
document.getElementById('plan-inp').addEventListener('keydown', e => { if (e.key === 'Enter') addPlan(); });
document.getElementById('week-prev').addEventListener('click', () => { weekOffset--; renderWeek(); });
document.getElementById('week-next').addEventListener('click', () => { weekOffset++; renderWeek(); });

renderWeek();

// ══════════════════════════════════════════
// SHEET HELPERS
// ══════════════════════════════════════════
function showSheet(id) {
  document.getElementById('overlay').classList.add('show');
  document.getElementById(id).classList.add('show');
}
function hideSheet(id) {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById(id).classList.remove('show');
}

document.getElementById('overlay').addEventListener('click', () => {
  ['habit-sheet','med-sheet'].forEach(id => hideSheet(id));
});
</script>
