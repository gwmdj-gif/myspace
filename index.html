<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f7f6f4">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Space">
<title>My Space</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f4;
  --bg2: #eeecea;
  --bg3: #e5e3e0;
  --card: #ffffff;
  --border: #e0dedd;
  --border2: #d0cecc;
  --text: #1a1917;
  --text2: #6b6966;
  --text3: #a8a5a2;
  --accent: #1a1917;
  --accent-soft: #3d3b38;
  --green: #5a7a5a;
  --red: #c0504a;
  --blue: #4a6a8a;
  --yellow: #b8940a;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --font: 'DM Sans', 'Noto Sans JP', sans-serif;
  --font-d: 'Outfit', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  min-height: 100vh; min-height: 100dvh;
  overscroll-behavior: none;
}

/* ── NAV BAR ── */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 calc(8px + var(--safe-b));
  z-index: 50;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  background: transparent; border: none; cursor: pointer;
  padding: 6px 0; transition: all 0.2s;
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; font-family: var(--font); }
.nav-btn.active .nav-label { color: var(--accent); font-weight: 600; }
.nav-btn.active .nav-icon { transform: translateY(-1px); }

/* ── PAGES ── */
.page { display: none; min-height: 100vh; padding-bottom: calc(72px + var(--safe-b)); }
.page.active { display: block; }

/* ── HEADER ── */
.page-header {
  padding: 52px 22px 16px;
  position: sticky; top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.page-date { font-size: 11px; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
.page-title { font-family: var(--font-d); font-size: 32px; font-weight: 700; color: var(--text); line-height: 1.1; }
.page-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* ── SECTION ── */
.section { padding: 20px 22px 0; }
.section-title {
  font-size: 10px; font-weight: 600; color: var(--text3);
  letter-spacing: 0.18em; text-transform: uppercase;
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-title::after { content:''; flex:1; height:1px; background:var(--border); }

/* ── CARDS ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px;
  margin-bottom: 10px;
}

/* ═══════════════════════════════════════════
   TASKS PAGE
═══════════════════════════════════════════ */
.task-input-row {
  display: flex; gap: 8px; margin-bottom: 6px;
}
.task-text-inp {
  flex: 1; background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 11px 14px;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--text); outline: none; transition: border-color 0.2s;
}
.task-text-inp:focus { border-color: var(--accent); }
.task-text-inp::placeholder { color: var(--text3); font-weight: 400; }
.add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 10px; width: 42px; height: 42px;
  font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s; flex-shrink: 0;
}
.add-btn:active { opacity: 0.7; }

.tag-row { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tag-chip {
  border: 1px solid var(--border2); border-radius: 6px;
  padding: 4px 10px; font-size: 11px; font-weight: 500;
  color: var(--text2); background: transparent; cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.04em;
}
.tag-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.task-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 13px 0; border-bottom: 1px solid var(--border);
  animation: fadeIn 0.25s ease;
  transition: opacity 0.25s, transform 0.25s;
}
.task-item:last-child { border-bottom: none; }
.task-item.removing { opacity: 0; transform: translateX(16px); }

.task-cb {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--border2); background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.task-cb.done { background: var(--accent); border-color: var(--accent); }
.task-cb svg { display: none; }
.task-cb.done svg { display: block; }

.task-body { flex: 1; min-width: 0; }
.task-txt { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.4; word-break: break-all; }
.task-txt.done { color: var(--text3); text-decoration: line-through; font-weight: 400; }
.task-tag { font-size: 11px; color: var(--text2); margin-top: 2px; letter-spacing: 0.06em; font-weight: 500; }
.task-deadline { font-size: 10px; color: var(--text3); }
.task-deadline.overdue { color: var(--red); }

.task-del { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 4px; }
.task-del:active { color: var(--red); }

.progress-summary {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: var(--bg2);
  border-radius: 10px; margin-bottom: 16px;
}
.progress-nums { font-family: var(--font-d); font-size: 28px; color: var(--text); line-height: 1; }
.progress-nums span { font-size: 14px; font-family: var(--font); color: var(--text3); font-weight: 400; }
.progress-bar-v { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-bar-v .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* ═══════════════════════════════════════════
   MEMO PAGE
═══════════════════════════════════════════ */
.memo-list { padding: 16px 22px; display: flex; flex-direction: column; gap: 10px; }
.memo-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; cursor: pointer;
  transition: border-color 0.15s;
  animation: fadeIn 0.25s ease;
}
.memo-card:active { border-color: var(--border2); background: var(--bg2); }
.memo-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.memo-card-preview { font-size: 12px; color: var(--text3); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.memo-card-date { font-size: 10px; color: var(--text3); margin-top: 8px; letter-spacing: 0.06em; }

.memo-fab {
  position: fixed; right: 22px; bottom: calc(80px + var(--safe-b));
  width: 52px; height: 52px; background: var(--accent); color: #fff;
  border: none; border-radius: 50%; font-size: 26px;
  cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.18);
  display: flex; align-items: center; justify-content: center;
  z-index: 20; transition: opacity 0.15s;
}
.memo-fab:active { opacity: 0.8; }

/* Memo editor overlay */
.memo-editor {
  position: fixed; inset: 0; background: var(--bg);
  z-index: 100; display: none; flex-direction: column;
}
.memo-editor.open { display: flex; }
.memo-editor-header {
  display: flex; align-items: center; gap: 12px;
  padding: 52px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.memo-back-btn {
  background: transparent; border: none; font-size: 22px;
  color: var(--text2); cursor: pointer; padding: 4px;
}
.memo-title-inp {
  flex: 1; background: transparent; border: none;
  font-family: var(--font-d); font-size: 22px; color: var(--text);
  outline: none;
}
.memo-title-inp::placeholder { color: var(--text3); }
.memo-del-btn {
  background: transparent; border: none; color: var(--text3);
  cursor: pointer; font-size: 16px; padding: 4px 8px;
}
.memo-body-inp {
  flex: 1; background: transparent; border: none;
  padding: 18px 22px; font-family: var(--font);
  font-size: 15px; font-weight: 400; color: var(--text);
  line-height: 1.8; outline: none; resize: none;
}
.memo-body-inp::placeholder { color: var(--text3); }
.memo-save-btn {
  margin: 0 22px 22px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px; padding: 14px;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.08em;
}
.memo-save-btn:active { opacity: 0.8; }

/* ═══════════════════════════════════════════
   HABIT PAGE
═══════════════════════════════════════════ */
.habit-today {
  font-size: 11px; color: var(--text3); letter-spacing: 0.12em;
  text-align: center; margin-bottom: 16px;
}
.habit-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; background: var(--card);
  border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 8px; cursor: pointer;
  transition: all 0.2s;
}
.habit-item.checked { background: var(--accent); border-color: var(--accent); }
.habit-icon { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.habit-info { flex: 1; }
.habit-name { font-size: 14px; font-weight: 600; color: var(--text); }
.habit-item.checked .habit-name { color: #fff; }
.habit-streak { font-size: 11px; color: var(--text3); margin-top: 2px; }
.habit-item.checked .habit-streak { color: rgba(255,255,255,0.7); }
.habit-check { font-size: 18px; color: var(--text3); }
.habit-item.checked .habit-check { color: #fff; }

.habit-week-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px; margin-top: 8px;
}
.habit-week-day { text-align: center; }
.habit-week-label { font-size: 9px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.habit-week-dot {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--bg2); margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.habit-week-dot.done { background: var(--accent); color: #fff; }
.habit-week-dot.today { border: 1.5px solid var(--accent); }

.add-habit-btn {
  width: 100%; background: transparent; border: 1.5px dashed var(--border2);
  border-radius: 12px; padding: 14px; font-family: var(--font);
  font-size: 13px; font-weight: 500; color: var(--text3);
  cursor: pointer; margin-top: 4px; transition: all 0.15s;
}
.add-habit-btn:active { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════════
   WEEKLY PLANNER PAGE
═══════════════════════════════════════════ */
.week-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 22px 12px;
}
.week-nav { background: transparent; border: none; font-size: 20px; color: var(--text2); cursor: pointer; padding: 4px 10px; }
.week-range { font-size: 13px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }

.week-days { display: flex; gap: 0; overflow-x: auto; padding: 0 22px 12px; scrollbar-width: none; }
.week-days::-webkit-scrollbar { display: none; }
.week-day-tab {
  flex-shrink: 0; width: 48px; text-align: center;
  padding: 8px 0; border-radius: 10px; cursor: pointer;
  transition: all 0.15s; margin-right: 4px;
}
.week-day-tab.active { background: var(--accent); }
.week-day-tab .wd-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.08em; }
.week-day-tab.active .wd-label { color: rgba(255,255,255,0.7); }
.week-day-tab .wd-num { font-size: 18px; font-weight: 600; color: var(--text); }
.week-day-tab.active .wd-num { color: #fff; }
.week-day-tab.today .wd-num { color: var(--accent); }
.week-day-tab.today.active .wd-num { color: #fff; }
.week-day-tab .wd-dot { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin: 3px auto 0; }
.week-day-tab .wd-dot.has-tasks { background: var(--text3); }
.week-day-tab.active .wd-dot.has-tasks { background: rgba(255,255,255,0.6); }

.plan-list { padding: 0 22px; }
.plan-item {
  display: flex; gap: 14px; padding: 13px 0;
  border-bottom: 1px solid var(--border);
  animation: fadeIn 0.2s ease;
}
.plan-item:last-child { border-bottom: none; }
.plan-time { font-size: 11px; color: var(--text3); font-weight: 500; width: 40px; flex-shrink: 0; padding-top: 2px; letter-spacing: 0.04em; }
.plan-content { flex: 1; }
.plan-title-inp {
  width: 100%; background: transparent; border: none;
  font-family: var(--font); font-size: 14px; font-weight: 500;
  color: var(--text); outline: none; padding: 0;
}
.plan-title-inp::placeholder { color: var(--text3); font-weight: 400; }
.plan-add-row {
  display: flex; gap: 8px; padding: 14px 0; align-items: center;
}
.plan-time-sel {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 10px;
  font-family: var(--font); font-size: 12px; font-weight: 500;
  color: var(--text); outline: none; width: 90px;
}
.plan-inp {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  color: var(--text); outline: none;
}
.plan-inp:focus { border-color: var(--accent); }
.plan-inp::placeholder { color: var(--text3); font-weight: 400; }
.plan-add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; width: 36px; height: 36px;
  font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── OVERLAY SHEET ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 60; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.overlay.show { opacity: 1; pointer-events: all; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 18px 22px calc(32px + var(--safe-b));
  z-index: 70; transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(.32,1,.4,1);
}
.sheet.show { transform: translateY(0); }
.sheet-handle { width: 36px; height: 3px; background: var(--border2); border-radius: 2px; margin: 0 auto 18px; }
.sheet-title { font-family: var(--font-d); font-size: 20px; color: var(--text); margin-bottom: 18px; }
.sheet-inp {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; font-family: var(--font);
  font-size: 14px; font-weight: 500; color: var(--text); outline: none;
  margin-bottom: 12px; transition: border-color 0.2s;
}
.sheet-inp:focus { border-color: var(--accent); }
.icon-pick-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.icon-pick { width: 40px; height: 40px; border-radius: 10px; background: var(--bg2);
  border: 1.5px solid transparent; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.icon-pick.active { border-color: var(--accent); background: var(--bg3); }
.sheet-submit { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 14px; font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; }
.sheet-submit:active { opacity: 0.8; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-b) + 12px); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  z-index: 200; opacity: 0; transition: all 0.3s; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
</style>
</head>

  <div class="section" style="padding-top:20px; padding-bottom:16px;">
    <div class="section-title">⚖ 体重記録</div>
